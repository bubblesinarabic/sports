<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>أنواع الرياضة - نظام الدخول الآمن</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    :root {
      --brand-teal-dark: #2aa9a6;
      --ink: #0f172a; 
      --white: #ffffff;
      --muted: #64748b;
      --primary: #EF4444;
      --secondary: #3B82F6;
      --accent: #FDE047;
      --card-bg: rgba(255, 255, 255, 0.96);
    }

    body {
      font-family: 'Almarai', sans-serif;
      margin: 0;
      background: radial-gradient(circle at 50% 0%, #1e3a8a 0%, #0f172a 60%, #064e3b 100%);
      background-attachment: fixed;
      min-height: 100vh;
    }

    /* --- Action Bar --- */
    .action-bar {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 16px 24px;
      border-radius: 16px;
      margin: 16px auto;
      max-width: 1200px;
      width: 95%;
      display: flex; 
      align-items: center; 
      justify-content: space-between;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      z-index: 1000;
      position: relative;
    }

    .btn {
      display: inline-flex; align-items: center; gap: 8px; padding: 10px 18px;
      border-radius: 10px; font-weight: 800; cursor: pointer; border: none; font-family: inherit;
    }
    .btn-ghost { background: transparent; color: var(--brand-teal-dark); border: 2px solid var(--brand-teal-dark); }
    .btn-primary-home { background: var(--brand-teal-dark); color: #fff; text-decoration: none; }

    /* --- Auth Modal --- */
    .auth-modal { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.4); z-index: 10000; backdrop-filter: blur(4px); }
    .auth-modal.open { display: flex; }
    .auth-modal-card { background: var(--white); border-radius: 24px; padding: 32px; max-width: 400px; width: 92%; position: relative; text-align: center; }
    .auth-input { width: 100%; padding: 14px; margin-bottom: 16px; border: 1px solid rgba(0,0,0,0.1); border-radius: 12px; font-family: inherit; }
    .btn-google { background: white; border: 1px solid #ddd; width: 100%; padding: 12px; border-radius: 12px; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: 700; cursor: pointer; margin-bottom: 15px;}

    /* --- LMS Container (مخفي افتراضياً) --- */
    .lms-container {
      display: none; /* هذا هو القفل: لا يظهر إلا بعد تسجيل الدخول */
      width: 95%; max-width: 1000px; background: var(--card-bg); border-radius: 20px; 
      margin: 20px auto; overflow: hidden; flex-direction: column; border: 5px solid white;
    }

    .header-container { background-image: url("https://raw.githubusercontent.com/bubblesinarabic/sports/main/background.png"); background-size: cover; padding: 60px 20px; text-align: center; color: white; position: relative; }
    .header-container::before { content: ""; position: absolute; inset: 0; background: rgba(0,0,0,0.6); }
    .score-board { position: absolute; top: 20px; left: 20px; background: var(--accent); color: #000; padding: 8px 15px; border-radius: 12px; font-weight: bold; z-index: 10; }
    
    .slide-wrapper { padding: 20px; height: 500px; overflow-y: auto; text-align: center; }
    .slide { display: none; }
    .slide.active { display: block; }
    
    .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
    .menu-btn { background: white; border: 2px solid #eee; padding: 20px; border-radius: 15px; cursor: pointer; font-weight: bold; font-family: inherit; }
  </style>
</head>
<body>

  <div class="action-bar">
    <div style="font-weight: 800; color: var(--brand-teal-dark); font-size: 1.2rem; display: flex; align-items: center; gap: 8px;">
      <i data-lucide="book-open"></i> المكتبة التعليمية
    </div>
    <div style="display: flex; gap: 15px;">
      <button id="authBtnLib" class="btn btn-ghost">
        <i data-lucide="user" size="18"></i> <span id="authBtnTextLib">دخول</span>
      </button>
      <a href="#" class="btn btn-primary-home">الرئيسية <i data-lucide="home" size="18"></i></a>
    </div>
  </div>

  <div id="authModalLib" class="auth-modal">
    <div class="auth-modal-card">
      <h3 id="authTitleLib" style="margin-top: 0;">تسجيل الدخول</h3>
      
      <button class="btn-google" id="googleAuthBtn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" height="18">
        دخول بواسطة جوجل
      </button>

      <input type="email" id="authEmailLib" class="auth-input" placeholder="البريد الإلكتروني" />
      <input type="password" id="authPasswordLib" class="auth-input" placeholder="كلمة المرور" />
      <p id="authErrorLib" style="color:red; font-size:0.8rem; display:none;"></p>
      
      <button class="btn" id="submitAuthLib" style="width: 100%; background: var(--brand-teal-dark); color: white;">دخول</button>
      
      <button id="toggleAuthModeLib" style="background:none; border:none; color:var(--brand-teal-dark); cursor:pointer; margin-top: 15px; font-family: inherit;">
        ليس لديك حساب؟ إنشاء حساب جديد
      </button>
    </div>
  </div>

  <div class="lms-container" id="mainGameContainer">
    <div class="header-container">
      <div class="score-board"><i data-lucide="star" size="16"></i> <span id="global-score">0</span> نقطة</div>
      <h1 style="position: relative; z-index: 1;">أنواع الرياضة</h1>
    </div>

    <div class="slide-wrapper">
      <div class="slide active" id="slide-intro">
        <h2>مرحباً بك في تحدي الرياضة!</h2>
        <p>يجب عليك تسجيل الدخول لتتمكن من رؤية هذا المحتوى.</p>
        <button class="menu-btn" style="background: var(--secondary); color: white;" onclick="goToSlide('0')">ابدأ اللعب الآن</button>
      </div>

      <div class="slide" id="slide-0">
        <h2>القائمة الرئيسية</h2>
        <div class="menu-grid">
          <button class="menu-btn" onclick="alert('سيبدأ النشاط قريباً!')">اقرأ وتعلم</button>
          <button class="menu-btn" onclick="alert('سيبدأ النشاط قريباً!')">البطاقات التعليمية</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { 
      getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, 
      onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // إعدادات Firebase الخاصة بك
    const firebaseConfig = {
      apiKey: "AIzaSyDV9jP60p8IWgU-P2So7F5BQChC1-286UA",
      authDomain: "bubblesinarabic-library.firebaseapp.com",
      projectId: "bubblesinarabic-library",
      storageBucket: "bubblesinarabic-library.firebasestorage.app",
      messagingSenderId: "120962688870",
      appId: "1:120962688870:web:b50cf9eeaa02d58dd30aa7"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const googleProvider = new GoogleAuthProvider();

    // العناصر
    const lmsContainer = document.getElementById('mainGameContainer');
    const authModal = document.getElementById('authModalLib');
    const authBtnText = document.getElementById('authBtnTextLib');

    // ** حارس البوابة (Auth Guard) **
    onAuthStateChanged(auth, (user) => {
      if (user) {
        // حالة: مسجل دخول
        authBtnText.textContent = "خروج";
        lmsContainer.style.display = 'flex'; // إظهار المحتوى
        authModal.classList.remove('open');   // إغلاق نافذة الدخول
        console.log("مرحباً بك: " + user.email);
      } else {
        // حالة: غير مسجل دخول
        authBtnText.textContent = "دخول";
        lmsContainer.style.display = 'none';  // إخفاء المحتوى تماماً
        authModal.classList.add('open');     // إظهار نافذة الدخول إجبارياً
      }
    });

    // التحكم في تسجيل الدخول (جوجل)
    document.getElementById('googleAuthBtn').onclick = () => signInWithPopup(auth, googleProvider);

    // زر الخروج / الدخول العلوي
    document.getElementById('authBtnLib').onclick = () => {
      if (auth.currentUser) { signOut(auth); } 
      else { authModal.classList.add('open'); }
    };
  </script>

  <script>
    // التحكم في الأيقونات والشرائح
    lucide.createIcons();
    function goToSlide(n) {
      document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
      document.getElementById('slide-' + n).classList.add('active');
    }
  </script>

</body>
</html>
